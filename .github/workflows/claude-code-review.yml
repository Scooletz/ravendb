name: Claude Code Review

on:
  pull_request_target:
    types: [review_requested]

jobs:
  claude-review:
    if: github.event.requested_reviewer.login == 'ravendb-bot'

    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      issues: read

    steps:
      # Mint a custom GitHub App token so the action skips Anthropic's OIDC
      # exchange (which 401s for some actor/event combinations) and so review
      # comments are posted as ravendb-bot[bot] rather than claude[bot].
      # See https://github.com/anthropics/claude-code-action/issues/1017
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.RAVENDB_BOT_APP_ID }}
          private-key: ${{ secrets.RAVENDB_BOT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@62238ddb33772a079b0a6d8665a1ff3043583067 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          # Suppress the default "🤖 Generated with Claude Code" footer on
          # comments and PR descriptions — ravendb-bot[bot] is sufficient
          # attribution. See https://code.claude.com/docs/en/settings#attribution-settings
          settings: |
            {
              "attribution": {
                "pr": "",
                "commit": ""
              }
            }
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |-
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment

            Override the plugin's default top-level comment behavior. Always post
            exactly ONE top-level comment via `gh pr comment` with this structure:

            **Verdict:** 🔴 N important · 🟡 N nit · 🟣 N pre-existing
            (use 🟢 "no issues" if all zero)

            ## Change summary
            Brief description of what this PR changes — files touched, intent,
            anything noteworthy about the approach. 2-5 sentences.

            ## Review summary
            - Important findings worth blocking on (if any)
            - Nits / minor concerns (cap at 5; mention rest as a count)
            - Pre-existing issues spotted but not introduced by this PR (if any)

            Severity calibration for THIS repo:
            - **Important** = code that will break behavior, leak data, fail
              under concurrency, or violate a CLAUDE.md rule that was clearly
              applicable.
            - **Nit** = naming, structure, missing comments, suggestions that
              don't affect correctness.
            - Anything CI already enforces (tabs in .cs files, missing
              RavenFact / RavenTheory attribute, ServerRequestHandler
              inheritance) is implicit and should NOT be flagged unless the
              agent verified CI didn't catch it.
            - Skip libs/, node_modules, generated files, and PERF-marked code
              (per CLAUDE.md, do not modify PERF code).

            Post this single combined comment in BOTH cases:
            - When the plugin would otherwise post its canonical "No issues
              found" message — replace it with the structure above (verdict
              line + summary).
            - When the plugin posts inline issue comments — additionally post
              the above as the top-level summary so reviewers see the
              high-level picture without scrolling through inline threads.

            Do NOT add any "Generated with Claude Code" footer or robot emoji
            attribution. Comments authored by ravendb-bot[bot] are already
            attributed sufficiently.
          # Allowlist mirrors the code-review plugin's own allowed-tools plus
          # Read/Grep/Glob/Task/TodoWrite needed by its subagent orchestration.
          # No Bash escape, no WebFetch, no Edit/Write — code review is read-only.
          # Model is set via the RAVENDB_BOT_REVIEW_MODEL repository (or org)
          # variable (e.g. claude-sonnet-4-6, claude-opus-4-7).
          claude_args: '--max-turns 50 --model ${{ vars.RAVENDB_BOT_REVIEW_MODEL }} --allowedTools "Read,Grep,Glob,Task,TodoWrite,mcp__github_inline_comment__create_inline_comment,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
