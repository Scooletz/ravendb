name: Claude Code Review

on:
  pull_request_target:
    types: [review_requested]

jobs:
  claude-review:
    if: github.event.requested_reviewer.login == 'ravendb-bot'

    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      issues: read

    steps:
      # Mint a custom GitHub App token so the action skips Anthropic's OIDC
      # exchange (which 401s for some actor/event combinations) and so review
      # comments are posted as ravendb-bot[bot] rather than claude[bot].
      # See https://github.com/anthropics/claude-code-action/issues/1017
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.RAVENDB_BOT_APP_ID }}
          private-key: ${{ secrets.RAVENDB_BOT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@62238ddb33772a079b0a6d8665a1ff3043583067 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          claude_args: '--max-turns 50 --model claude-opus-4-7'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
