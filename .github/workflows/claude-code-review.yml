name: Claude Code Review

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@hugin-review') &&
      (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'COLLABORATOR')

    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      issues: read

    steps:
      # Mint a custom GitHub App token so the action skips Anthropic's OIDC
      # exchange (which 401s for some actor/event combinations) and so review
      # comments are posted as hugin-bot[bot] rather than claude[bot].
      # See https://github.com/anthropics/claude-code-action/issues/1017
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.RAVENDB_BOT_APP_ID }}
          private-key: ${{ secrets.RAVENDB_BOT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@62238ddb33772a079b0a6d8665a1ff3043583067 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          # Suppress the default "🤖 Generated with Claude Code" footer on
          # comments and PR descriptions — hugin-bot[bot] is sufficient
          # attribution. See https://code.claude.com/docs/en/settings#attribution-settings
          settings: |
            {
              "attribution": {
                "pr": "",
                "commit": ""
              }
            }
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # Prompt body is sourced from the RAVENDB_BOT_REVIEW_PROMPT
          # repository (or org) variable so reviewers can iterate on the
          # instructions without editing the workflow. The slash command
          # stays inline because the PR slug needs the github event
          # context, and repo variable values aren't re-evaluated as
          # expressions.
          prompt: |-
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.issue.number }} --comment

            ${{ vars.RAVENDB_BOT_REVIEW_PROMPT }}
          # Allowlist mirrors the code-review plugin's own allowed-tools plus
          # Read/Grep/Glob/Task/TodoWrite needed by its subagent orchestration.
          # No Bash escape, no WebFetch, no Edit/Write — code review is read-only.
          # Model is set via the RAVENDB_BOT_REVIEW_MODEL repository (or org)
          # variable (e.g. claude-sonnet-4-6, claude-opus-4-7).
          claude_args: '--max-turns 50 --model ${{ vars.RAVENDB_BOT_REVIEW_MODEL }} --allowedTools "Read,Grep,Glob,Task,TodoWrite,mcp__github_inline_comment__create_inline_comment,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
          # Set the RAVENDB_BOT_REVIEW_SHOW_FULL_OUTPUT repository (or org)
          # variable to "true" to print Claude's full execution trace to
          # the workflow log for debugging. Leave unset or set to "false"
          # for normal runs — the trace can leak source snippets the
          # agent read while reviewing.
          show_full_output: ${{ vars.RAVENDB_BOT_REVIEW_SHOW_FULL_OUTPUT }}
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
